description: "Selfie talking-head narrative — creator looks straight into camera
  and tells a personal story (dating fiasco, family drama, work incident, true
  crime, throwback). 60-180s — one of the few long formats that works on
  short-form feeds. The story format breaks scroll rules: viewers commit because
  they want the payoff. Strong pre-hook in the first 2s, escalating tension with
  pattern-interrupts every 8-15s (b-roll cutaway, screenshot insert, gesture
  zoom), then a payoff or cliffhanger that drives DM-share and part-2 follow.
  Subtitles mandatory — 85% of viewers watch muted. Distinct from
  talking-head-rant (contrarian opinion) and yap-talking-head (single education
  idea): storytime is plot-driven and rides on rising tension, not on a hot
  take."
